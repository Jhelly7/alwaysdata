# Colocar este ficheiro na RAIZ do repositório Git (mesmo nível do package.json)
# Estrutura esperada:
#   /
#   ├── package.json
#   ├── render.yaml          
#   └── src/
#       ├── server.js
#       ├── polygon.js
#       ├── chain.js
#       ├── qr.js
#       └── keepalive.js

services:
  - type: web
    name: polygon-microservice
    env: node
    region: oregon             # US West — mais próximo do Brasil que Frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      # ── Wallet ────────────────────────────────────────────────────────────
      - key: WALLET_MNEMONIC
        sync: false            # preencher manualmente no dashboard Render

      # ── Auth ──────────────────────────────────────────────────────────────
      - key: POLYGON_SERVICE_SECRET
        sync: false

      # ── Polygon RPC ───────────────────────────────────────────────────────
      - key: POLYGON_RPC_URL
        value: https://polygon-rpc.com
      - key: POLYGON_CHAIN_ID
        value: "137"

      # ── Polygonscan ───────────────────────────────────────────────────────
      - key: POLYGONSCAN_API_KEY
        sync: false

      # ── USDT contract (mainnet) ───────────────────────────────────────────
      - key: USDT_CONTRACT
        value: "0xc2132D05D31c914a87C6611C10748AEb04B58e8F"